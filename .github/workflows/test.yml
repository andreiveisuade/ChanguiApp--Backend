name: Tests

on:
  pull_request:
    branches: [dev, test, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: TypeScript build
        run: npm run build
      - name: Security audit (npm audit)
        run: npm audit --audit-level=high
